<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>404 — Property Not Found</title>
<link rel="icon" href="./logo.png"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#0B132B;--secondary:#1C2541;--gold:#D4AF37;--gold-2:#F4CF6A;--muted:#6B7280;--grad:linear-gradient(135deg,#D4AF37,#F4CF6A 55%,#B98A24)}
*{box-sizing:border-box;margin:0;padding:0}html,body{overflow-x:hidden;max-width:100vw;height:100%}
body{font-family:Poppins,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#fff;text-align:center;padding:30px;position:relative;overflow:hidden;background:var(--primary)}
body::before{content:"";position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=1600&q=80') center/cover;opacity:.28;z-index:-2}
body::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(212,175,55,.15),transparent 60%),linear-gradient(180deg,rgba(11,19,43,.85),rgba(11,19,43,.95));z-index:-1}
h1,h2{font-family:'Playfair Display',serif}
.big{font-size:clamp(6rem,20vw,14rem);font-weight:800;line-height:1;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:-.02em;animation:fl 4s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.house{width:80px;height:80px;margin:0 auto 20px;color:var(--gold);animation:sway 3s ease-in-out infinite}
@keyframes sway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
.eyebrow{display:inline-block;font-size:.72rem;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:14px}
h2{font-size:clamp(1.5rem,3vw,2.4rem);color:#fff;margin:16px 0 14px}
p{color:rgba(255,255,255,.7);max-width:520px;margin:0 auto 36px;font-size:1.02rem}
.actions{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.btn{padding:14px 30px;border-radius:999px;font-weight:600;font-size:.86rem;letter-spacing:.04em;text-transform:uppercase;transition:.35s;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
.btn-gold{background:var(--grad);color:var(--primary);box-shadow:0 18px 40px -12px rgba(212,175,55,.5)}.btn-gold:hover{transform:translateY(-3px)}
.btn-ghost{border:1.5px solid rgba(255,255,255,.3);color:#fff}.btn-ghost:hover{background:rgba(255,255,255,.1);border-color:var(--gold);color:var(--gold)}
.brand{position:absolute;top:30px;left:30px;display:flex;align-items:center;gap:12px}
.brand img{height:38px}.brand div{color:#fff;font-family:'Playfair Display';font-size:1.05rem;font-weight:700}
.brand small{display:block;font-family:Poppins;font-size:.58rem;letter-spacing:.32em;color:var(--gold);text-transform:uppercase;margin-top:2px}
</style></head>
<body>

<a href="index.html" class="brand"><img src="./logo.png" alt=""/><div>LUXURY<small>Real Estate</small></div></a>

<div>
  <svg class="house" viewBox="0 0 100 100" fill="currentColor">
    <path d="M50 10 L90 45 L82 45 L82 85 L60 85 L60 60 L40 60 L40 85 L18 85 L18 45 L10 45 Z" opacity=".92"/>
  </svg>
  <span class="eyebrow">Lost Address</span>
  <div class="big">404</div>
  <h2>This property doesn't exist.</h2>
  <p>The listing you were looking for may have sold, moved, or never existed. Let's help you find your next address.</p>
  <div class="actions">
    <a href="index.html" class="btn btn-gold">← Return Home</a>
    <a href="properties.html" class="btn btn-ghost">⌕ Browse Properties</a>
  </div>
</div>

</body></html>
